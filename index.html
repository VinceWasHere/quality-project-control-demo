<style>

.login{min-height:100vh;display:grid;grid-template-columns:1.1fr .9fr}.login-art{background:linear-gradient(135deg,#0b2545,#1f5f99);color:#fff;padding:48px;display:flex;flex-direction:column;justify-content:space-between}.brand{display:flex;align-items:center;gap:12px}.logo{width:52px;height:52px;border-radius:14px;background:#fff;color:var(--navy);display:grid;place-items:center;font-size:22px;font-weight:900}.login-art h1{font-size:42px;line-height:1.08;max-width:680px;margin:44px 0 18px}.login-art p{max-width:640px;color:#d7e5f2;font-size:18px;line-height:1.55}.features{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:25px;max-width:680px}.feature{border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.08);border-radius:14px;padding:14px}.login-side{background:#fff;display:flex;align-items:center;justify-content:center;padding:30px}.login-card{width:min(430px,100%)}.login-card h2{font-size:28px;margin:0}.sub{color:var(--muted);line-height:1.5;margin:8px 0 24px}.field{margin-bottom:14px}.field label{display:block;font-size:13px;font-weight:800;color:#344054;margin-bottom:7px}.field input,.field select,.field textarea{width:100%;border:1px solid var(--line);border-radius:10px;padding:11px 12px;background:#fff}.field textarea{min-height:92px;resize:vertical}.demo-list{border:1px solid var(--line);background:#fafcff;border-radius:14px;padding:13px;margin-top:20px}.demo-row{display:flex;justify-content:space-between;gap:10px;padding:8px 0;border-bottom:1px solid #edf0f4;font-size:12px}.demo-row:last-child{border:0}.demo-row button{border:0;background:var(--bluebg);color:#175cd3;padding:5px 8px;border-radius:8px;font-weight:800}
.btn{border:0;border-radius:10px;padding:10px 14px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;gap:7px}.primary{background:var(--navy);color:#fff}.secondary{background:#eef2f6;color:var(--text)}.outline{background:#fff;color:var(--navy);border:1px solid var(--line)}.success{background:var(--greenbg);color:var(--green)}.warning{background:var(--yellowbg);color:var(--yellow)}.danger{background:var(--redbg);color:var(--red)}.btn:disabled{opacity:.5;cursor:not-allowed}
.shell{min-height:100vh;display:grid;grid-template-columns:260px 1fr}.sidebar{background:var(--navy);color:#fff;padding:20px 15px;position:sticky;top:0;height:100vh;overflow:auto}.sidebar .brand{padding:0 5px 18px;border-bottom:1px solid rgba(255,255,255,.15)}.sidebar .logo{width:42px;height:42px;border-radius:10px;font-size:18px}.userbox{margin:16px 0;padding:13px;border:1px solid rgba(255,255,255,.14);border-radius:13px;background:rgba(255,255,255,.08)}.userbox strong{display:block;font-size:13px}.userbox span{display:block;font-size:11px;color:#c8d5e4;margin-top:4px}.navlabel{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:#91a8c1;margin:18px 10px 8px}.navbtn{width:100%;border:0;background:transparent;color:#fff;border-radius:10px;padding:11px 12px;text-align:left;margin:3px 0}.navbtn:hover,.navbtn.active{background:rgba(255,255,255,.12)}.sidebottom{margin-top:22px;border-top:1px solid rgba(255,255,255,.15);padding-top:14px}.sidebottom button{width:100%;border:1px solid rgba(255,255,255,.2);background:transparent;color:#fff;border-radius:10px;padding:10px;margin-top:8px;font-weight:800}
.main{min-width:0}.topbar{height:70px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:20}.topbar h1{font-size:18px;margin:0}.topbar p{font-size:12px;color:var(--muted);margin:4px 0 0}.topright{display:flex;align-items:center;gap:10px}.rolepill{background:var(--bluebg);color:#175cd3;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:800}.avatar{width:38px;height:38px;border-radius:50%;background:var(--navy);color:#fff;display:grid;place-items:center;font-weight:900}.menubtn{display:none;border:0;background:#eef2f6;border-radius:9px;padding:8px 10px}.content{padding:24px;max-width:1500px;margin:0 auto}.pagehead{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:20px}.pagehead h2{margin:0;font-size:27px}.pagehead p{margin:7px 0 0;color:var(--muted)}.buttons{display:flex;gap:9px;flex-wrap:wrap}
.grid{display:grid;gap:16px}.g4{grid-template-columns:repeat(4,minmax(0,1fr))}.g3{grid-template-columns:repeat(3,minmax(0,1fr))}.g2{grid-template-columns:repeat(2,minmax(0,1fr))}.card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow)}.card h3{margin:0 0 14px;font-size:17px}.label{font-size:13px;color:var(--muted)}.value{font-size:30px;font-weight:900;margin-top:6px}.foot{font-size:12px;color:var(--muted);margin-top:5px}.pos{color:var(--green)}.warn{color:var(--yellow)}.crit{color:var(--red)}.section{display:flex;justify-content:space-between;align-items:center;gap:12px;margin:27px 0 12px}.section h3{margin:0;font-size:18px}.alert{border-radius:12px;padding:12px 14px;font-size:13px;margin-bottom:14px}.info{background:#eef5fc;color:#19496e;border:1px solid #cfe2f3}.a-warning{background:#fffaeb;color:#7a2e0e;border:1px solid #fedf89}.a-danger{background:#fff1f0;color:#912018;border:1px solid #fecdca}.a-success{background:#ecfdf3;color:#067647;border:1px solid #abefc6}
.tablewrap{overflow:auto;background:#fff;border:1px solid var(--line);border-radius:14px}table{width:100%;border-collapse:collapse;min-width:900px}th,td{padding:12px 13px;border-bottom:1px solid var(--line);text-align:left;font-size:13px;vertical-align:middle}th{background:#f8fafc;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:#475467}tr:last-child td{border:0}.badge{display:inline-flex;border-radius:999px;padding:5px 9px;font-size:11px;font-weight:800;white-space:nowrap}.b-blue{background:var(--bluebg);color:#175cd3}.b-green{background:var(--greenbg);color:var(--green)}.b-yellow{background:var(--yellowbg);color:var(--yellow)}.b-red{background:var(--redbg);color:var(--red)}.b-gray{background:#eef2f6;color:#475467}.actions{display:flex;gap:7px;flex-wrap:wrap}.formgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.full{grid-column:1/-1}.check{display:flex;gap:10px;align-items:flex-start;border:1px solid var(--line);border-radius:11px;padding:11px}.formactions{display:flex;justify-content:space-between;gap:10px;margin-top:20px}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:15px}.tab{border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 12px;font-size:12px;font-weight:800}.tab.active{background:var(--navy);color:#fff;border-color:var(--navy)}.kv{display:grid;grid-template-columns:150px 1fr;gap:8px;font-size:13px}.kv div:nth-child(odd){color:var(--muted)}.criteria{display:grid;gap:14px}.criterion{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px}.criterion h4{margin:10px 0 4px;font-size:15px}.meta{font-size:12px;color:var(--muted)}.opts{display:flex;gap:8px;flex-wrap:wrap;margin:13px 0}.opt{border:1px solid var(--line);background:#fff;border-radius:9px;padding:8px 11px}.opt.selected{background:var(--navy);color:#fff;border-color:var(--navy)}.opt.blocked{background:var(--redbg);color:var(--red);border-color:#fda29b}.scorebox{position:sticky;top:92px}.scorenum{font-size:42px;font-weight:900}.progress{height:10px;background:#eef2f6;border-radius:999px;overflow:hidden}.progress span{display:block;height:100%;background:var(--navy)}.traffic{display:flex;align-items:center;gap:8px;font-weight:800}.light{width:15px;height:15px;border-radius:50%}.green{background:#22c55e}.yellow{background:#f59e0b}.red{background:#ef4444}.timeline{position:relative;margin-left:8px}.timeline:before{content:"";position:absolute;left:9px;top:7px;bottom:8px;width:2px;background:var(--line)}.event{position:relative;padding:0 0 18px 32px}.dot{position:absolute;left:1px;top:2px;width:18px;height:18px;border-radius:50%;background:var(--navy);border:4px solid #fff;box-shadow:0 0 0 1px var(--line)}.event strong{font-size:13px}.event p{font-size:12px;color:var(--muted);margin:4px 0}.barrow{display:grid;grid-template-columns:180px 1fr 60px;gap:12px;align-items:center;font-size:13px;margin:13px 0}.track{height:10px;background:#eef2f6;border-radius:999px;overflow:hidden}.fill{height:100%;background:var(--navy)}.toast{position:fixed;right:22px;bottom:22px;background:var(--navy);color:#fff;border-radius:12px;padding:12px 15px;box-shadow:var(--shadow);z-index:100;font-size:13px}.overlay{display:none}
@media(max-width:1050px){.g4{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(2,1fr)}}
@media(max-width:820px){.login{grid-template-columns:1fr}.login-art{padding:28px}.login-art h1{font-size:31px;margin:28px 0 12px}.features{display:none}.login-side{padding:25px}.shell{grid-template-columns:1fr}.sidebar{position:fixed;left:-280px;z-index:50;width:260px;transition:.2s}.sidebar.open{left:0}.overlay{display:block;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:40}.menubtn{display:block}.content{padding:16px}.topbar{padding:0 14px}.pagehead{display:block}.pagehead .buttons{margin-top:13px}.g4,.g3,.g2{grid-template-columns:1fr}.formgrid{grid-template-columns:1fr}.full{grid-column:auto}.barrow{grid-template-columns:1fr}.scorebox{position:static}}
</style>

<body><div id="app"></div>
<script>
const DATA_KEY="qpc_v2_data",SESSION_KEY="qpc_v2_session";
const roles={EJECUCION:"Ingeniero de Ejecución",CALIDAD:"Ingeniero de Calidad",COORDINADOR:"Coordinador de Calidad",GERENCIA:"Gerente de Proyecto",PRESIDENTE:"Presidente"};
const seedUsers=[
{id:"e1",name:"Ing. Ejecución Demo",email:"ejecucion@codelpa.demo",password:"1234",role:"EJECUCION"},
{id:"c1",name:"Ing. Calidad Demo 1",email:"calidad@codelpa.demo",password:"1234",role:"CALIDAD"},
{id:"c2",name:"Ing. Calidad Demo 2",email:"calidad2@codelpa.demo",password:"1234",role:"CALIDAD"},
{id:"cc",name:"Coordinador Calidad Demo",email:"coordinador@codelpa.demo",password:"1234",role:"COORDINADOR"},
{id:"g1",name:"Gerente Demo",email:"gerencia@codelpa.demo",password:"1234",role:"GERENCIA"},
{id:"p1",name:"Presidente Demo",email:"presidente@codelpa.demo",password:"1234",role:"PRESIDENTE"}];
const template=[
{id:"DEM-001",section:"Documentación",q:"¿La referencia técnica requerida está disponible?",w:10,opts:["Cumple","No cumple"]},
{id:"DEM-002",section:"Documentación",q:"¿El alcance coincide con el mapeo presentado?",w:15,opts:["Cumple","Parcial","No cumple"]},
{id:"DEM-003",section:"Ejecución",q:"¿El trabajo cumple visualmente con el criterio configurado?",w:30,opts:["Cumple","Parcial","No cumple"]},
{id:"DEM-004",section:"Ejecución",q:"¿Existe una condición crítica que impida continuar?",w:25,opts:["No","Sí"],block:true},
{id:"DEM-005",section:"Terminación",q:"¿El área está limpia y lista para el siguiente proceso?",w:20,opts:["Cumple","No cumple","No aplica"]}];
function fresh(){return{users:seedUsers,requests:[
{id:"r1",code:"INSP-LCE-2026-0001",createdBy:"e1",activity:"Control de Mampostería",objective:90,contractor:"Contratista Demo A",location:"Bloque D1 · Nivel 02 · Habitación 2101",package:"PL-D1-N02-MAMP-H2101-001",scope:"Muro interior de habitación, paño completo",date:"2026-07-22",time:"08:00",ready:true,files:["foto_area_2101.jpg","ARQ-D1-N02-REV05.pdf"],status:"SOLICITADA",quality:null,answers:{},notes:{},management:{area:100,docs:100,schedule:100,support:100},technical:null,managementScore:null,final:null,traffic:null,decision:null,audit:[{at:"2026-07-22T07:42:00",user:"e1",action:"Solicitud creada"},{at:"2026-07-22T07:45:00",user:"e1",action:"Área confirmada como lista"}]},
{id:"r2",code:"INSP-LCE-2026-0002",createdBy:"e1",activity:"Control de Pañete",objective:95,contractor:"Contratista Demo A",location:"Bloque D1 · Nivel 02 · Pasillo",package:"PL-D1-N02-PAN-PAS-001",scope:"Paño completo de pasillo",date:"2026-07-22",time:"08:00",ready:true,files:["foto_pasillo.jpg"],status:"SOLICITADA",quality:null,answers:{},notes:{},management:{area:100,docs:90,schedule:100,support:100},technical:null,managementScore:null,final:null,traffic:null,decision:null,audit:[{at:"2026-07-22T07:50:00",user:"e1",action:"Solicitud creada"}]},
{id:"r3",code:"INSP-LCE-2026-0003",createdBy:"e1",activity:"Control de Colocación de Pisos",objective:95,contractor:"Contratista Demo B",location:"Bloque D1 · Nivel 02 · Habitación 2102",package:"PL-D1-N02-PISO-H2102-001",scope:"Piso interior de habitación",date:"2026-07-22",time:"08:20",ready:false,files:[],status:"BORRADOR",quality:null,answers:{},notes:{},management:{area:0,docs:0,schedule:100,support:0},technical:null,managementScore:null,final:null,traffic:null,decision:null,audit:[{at:"2026-07-22T07:55:00",user:"e1",action:"Borrador creado"}]}
]}}
let data=load(),ui={view:"home",selected:null,tab:"DISPONIBLES"};
function load(){try{return JSON.parse(localStorage.getItem(DATA_KEY))||fresh()}catch{return fresh()}}function save(){localStorage.setItem(DATA_KEY,JSON.stringify(data))}
function session(){try{return JSON.parse(localStorage.getItem(SESSION_KEY)||"null")}catch{return null}}function current(){let s=session();return s?data.users.find(x=>x.id===s.user):null}
function esc(s=""){return String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]))}
function initials(n){return n.split(" ").filter(Boolean).slice(0,2).map(x=>x[0]).join("").toUpperCase()}function now(){return new Date().toISOString()}
function user(id){return data.users.find(x=>x.id===id)}function req(id){return data.requests.find(x=>x.id===id)}function isQuality(u){return["CALIDAD","COORDINADOR"].includes(u.role)}function canReadAll(u){return isQuality(u)||["GERENCIA","PRESIDENTE"].includes(u.role)}
function showToast(t){let e=document.createElement("div");e.className="toast";e.textContent=t;document.body.appendChild(e);setTimeout(()=>e.remove(),2200)}
function render(){let u=current();document.getElementById("app").innerHTML=u?shell(u):login();bind(u)}
function login(){return`<div class="login"><section class="login-art"><div><div class="brand"><div class="logo">C</div><div><strong>QUALITY PROJECT CONTROL</strong><div style="color:#cbd9e7;font-size:13px">CODELPA</div></div></div><h1>Gestión digital de inspecciones, trazabilidad y calidad en obra.</h1><p>El sistema identifica automáticamente si el usuario pertenece a Ejecución, Calidad o un nivel gerencial.</p><div class="features"><div class="feature">✓ Solicitudes guiadas</div><div class="feature">✓ Cola operativa</div><div class="feature">✓ Planilla y semáforo</div><div class="feature">✓ Trazabilidad por usuario</div></div></div><small style="color:#cbd9e7">Demo local. No utilizar esta autenticación en producción.</small></section><section class="login-side"><div class="login-card"><h2>Iniciar sesión</h2><p class="sub">Use uno de los usuarios de demostración.</p><div id="loginError"></div><div class="field"><label>Correo</label><input id="email" type="email" placeholder="usuario@codelpa.demo"></div><div class="field"><label>Contraseña</label><input id="password" type="password" placeholder="••••"></div><button id="loginBtn" class="btn primary" style="width:100%;padding:13px">Entrar</button><div class="demo-list"><strong style="font-size:13px">Usuarios de prueba</strong>${seedUsers.map(u=>`<div class="demo-row"><div><strong>${roles[u.role]}</strong><br>${u.email}</div><button data-fill="${u.email}">Usar</button></div>`).join("")}<div style="font-size:11px;color:var(--muted);margin-top:8px">Contraseña: <strong>1234</strong></div></div></div></section></div>`}
function nav(u){let a=[["home","⌂","Inicio"]];if(u.role==="EJECUCION")a.push(["new","＋","Solicitar inspección"],["mine","☷","Mis solicitudes"]);if(isQuality(u))a.push(["queue","☷","Bandeja de Calidad"],["assigned","✓","Mis inspecciones"]);if(canReadAll(u))a.push(["dashboard","▥","Dashboard"]);if(u.role==="COORDINADOR")a.push(["users","⚙","Usuarios y permisos"]);return a}
function shell(u){let title={home:"Inicio",new:"Solicitar inspección",mine:"Mis solicitudes",queue:"Bandeja de Calidad",assigned:"Mis inspecciones",detail:"Detalle de inspección",evaluate:"Planilla digital",dashboard:"Dashboard",users:"Usuarios y permisos"}[ui.view]||"Quality Project Control";return`<div class="shell"><aside id="sidebar" class="sidebar"><div class="brand"><div class="logo">C</div><div><strong>QUALITY PROJECT CONTROL</strong><div style="font-size:11px;color:#c8d5e4">CODELPA</div></div></div><div class="userbox"><strong>${esc(u.name)}</strong><span>${roles[u.role]}</span><span>Lopesan La Ceiba</span></div><div class="navlabel">Navegación</div>${nav(u).map(x=>`<button class="navbtn ${ui.view===x[0]?"active":""}" data-nav="${x[0]}">${x[1]} &nbsp;${x[2]}</button>`).join("")}<div class="sidebottom"><button id="reset">Restablecer demo</button><button id="logout">Cerrar sesión</button></div></aside><main class="main"><header class="topbar"><div style="display:flex;align-items:center;gap:10px"><button id="menu" class="menubtn">☰</button><div><h1>${title}</h1><p>Proyecto Lopesan La Ceiba</p></div></div><div class="topright"><span class="rolepill">${roles[u.role]}</span><div class="avatar">${initials(u.name)}</div></div></header><div class="content">${view(u)}</div></main></div><div id="overlay" class="overlay hidden"></div>`}
function view(u){switch(ui.view){case"new":return newRequest(u);case"mine":return myRequests(u);case"queue":return queue(u);case"assigned":return assigned(u);case"detail":return detail(u);case"evaluate":return evaluate(u);case"dashboard":return dashboard(u);case"users":return usersView(u);default:return home(u)}}
function metric(l,v,f,t=""){return`<div class="card"><div class="label">${l}</div><div class="value ${t}">${v}</div><div class="foot">${f}</div></div>`}
function status(s){let m={BORRADOR:["Borrador","b-gray"],SOLICITADA:["Solicitada","b-blue"],TOMADA:["Tomada","b-blue"],EN_EVALUACION:["En evaluación","b-yellow"],CON_OBSERVACIONES:["Con observaciones","b-yellow"],LIBERADA:["Liberada","b-green"],NO_LIBERADA:["No liberada","b-red"]};let x=m[s]||[s,"b-gray"];return`<span class="badge ${x[1]}">${x[0]}</span>`}
function home(u){if(u.role==="EJECUCION"){let r=data.requests.filter(x=>x.createdBy===u.id);return`<div class="pagehead"><div><h2>Hola, ${esc(u.name)}</h2><p>Solicite inspecciones y consulte sus resultados.</p></div><div class="buttons"><button class="btn primary" data-nav="new">＋ Solicitar inspección</button></div></div><div class="grid g4">${metric("Solicitudes",r.length,"Registradas por usted")}${metric("Pendientes",r.filter(x=>["SOLICITADA","TOMADA","EN_EVALUACION"].includes(x.status)).length,"En proceso")}${metric("Con observaciones",r.filter(x=>x.status==="CON_OBSERVACIONES").length,"Requieren corrección","warn")}${metric("Liberadas",r.filter(x=>x.status==="LIBERADA").length,"Aprobadas por Calidad","pos")}</div><div class="section"><h3>Actividad reciente</h3></div>${table(r,u)}`}
if(isQuality(u)){let available=data.requests.filter(x=>x.status==="SOLICITADA"&&x.ready),mine=data.requests.filter(x=>x.quality===u.id&&!["LIBERADA","NO_LIBERADA"].includes(x.status));return`<div class="pagehead"><div><h2>Operación de Calidad</h2><p>Revise la cola y atienda inspecciones del proyecto.</p></div><div class="buttons"><button class="btn primary" data-nav="queue">Abrir bandeja</button></div></div><div class="grid g4">${metric("Disponibles",available.length,"Áreas listas")}${metric("Asignadas a mí",mine.length,"Inspecciones activas")}${metric("En evaluación",data.requests.filter(x=>x.status==="EN_EVALUACION").length,"Actualmente abiertas")}${metric("Resultado promedio",avg()+"%","Inspecciones calificadas","pos")}</div><div class="section"><h3>Prioridad operativa</h3></div>${table(sortQ(data.requests.filter(x=>["SOLICITADA","TOMADA","EN_EVALUACION"].includes(x.status))),u)}`}
return dashboard(u)}
function newRequest(u){if(u.role!=="EJECUCION")return denied();return`<div class="pagehead"><div><h2>Nueva solicitud</h2><p>Formulario simplificado para Ejecución.</p></div></div><div class="alert info">Los registros se guardan en este navegador y serán visibles para los usuarios de Calidad del demo.</div><div class="card"><div class="formgrid"><div class="field"><label>Actividad</label><select id="activity"><option>Control de Mampostería</option><option>Control de Pañete</option><option>Control de Colocación de Pisos</option><option>Control de Pintura</option><option>Control de Drywall</option></select></div><div class="field"><label>Objetivo</label><input id="objective" type="number" value="90"></div><div class="field"><label>Contratista</label><input id="contractor" value="Contratista Demo A"></div><div class="field"><label>Paquete de liberación</label><input id="package" value="PL-D1-N02-MAMP-H2101-001"></div><div class="field full"><label>Ubicación</label><input id="location" value="Bloque D1 · Nivel 02 · Habitación 2101"></div><div class="field"><label>Fecha</label><input id="date" type="date" value="2026-07-22"></div><div class="field"><label>Hora</label><input id="time" type="time" value="08:00"></div><div class="field full"><label>Alcance</label><textarea id="scope">Muro interior de habitación, paño completo.</textarea></div><div class="field full"><label class="check"><input id="ready" type="checkbox" checked><span>Confirmo que el área está terminada, limpia, accesible y lista para inspección.</span></label></div><div class="field"><label>Fotografías</label><input id="photos" type="file" multiple accept="image/*"><div class="foot">El demo guarda solo los nombres.</div></div><div class="field"><label>Plano o mapeo</label><input id="docs" type="file" multiple accept=".pdf,image/*"></div></div><div class="formactions"><button class="btn secondary" data-nav="home">Cancelar</button><div class="buttons"><button id="draft" class="btn outline">Guardar borrador</button><button id="submit" class="btn primary">Enviar a Calidad</button></div></div></div>`}
function myRequests(u){if(u.role!=="EJECUCION")return denied();return`<div class="pagehead"><div><h2>Mis solicitudes</h2><p>Solo se muestran las solicitudes creadas por este usuario.</p></div><div class="buttons"><button class="btn primary" data-nav="new">＋ Nueva</button></div></div>${table(data.requests.filter(x=>x.createdBy===u.id),u)}`}
function sortQ(a){return[...a].sort((x,y)=>x.ready!==y.ready?(x.ready?-1:1):(`${x.date}T${x.time}`).localeCompare(`${y.date}T${y.time}`))}
function queue(u){if(!isQuality(u))return denied();let r=ui.tab==="DISPONIBLES"?data.requests.filter(x=>x.status==="SOLICITADA"&&x.ready):ui.tab==="NO_LISTAS"?data.requests.filter(x=>!x.ready):data.requests;return`<div class="pagehead"><div><h2>Bandeja de Calidad</h2><p>Ordenada por disponibilidad real, fecha y hora.</p></div></div><div class="tabs"><button class="tab ${ui.tab==="DISPONIBLES"?"active":""}" data-tab="DISPONIBLES">Disponibles</button><button class="tab ${ui.tab==="NO_LISTAS"?"active":""}" data-tab="NO_LISTAS">No listas</button><button class="tab ${ui.tab==="TODAS"?"active":""}" data-tab="TODAS">Todas</button></div>${table(sortQ(r),u)}`}
function assigned(u){if(!isQuality(u))return denied();return`<div class="pagehead"><div><h2>Mis inspecciones</h2><p>Tomadas por el usuario autenticado.</p></div></div>${table(data.requests.filter(x=>x.quality===u.id),u)}`}
function table(rows,u){if(!rows.length)return`<div class="card" style="text-align:center;color:var(--muted)">No hay registros.</div>`;return`<div class="tablewrap"><table><thead><tr><th>Código</th><th>Hora</th><th>Actividad</th><th>Ubicación</th><th>Solicitante</th><th>Área lista</th><th>Responsable Calidad</th><th>Estado</th><th>Acciones</th></tr></thead><tbody>${rows.map(r=>`<tr><td><strong>${r.code}</strong></td><td>${r.date} · ${r.time}</td><td>${esc(r.activity)}</td><td>${esc(r.location)}</td><td>${esc(user(r.createdBy)?.name||"—")}</td><td>${r.ready?'<span class="badge b-green">Lista</span>':'<span class="badge b-gray">No confirmada</span>'}</td><td>${esc(user(r.quality)?.name||"Sin asignar")}</td><td>${status(r.status)}</td><td><div class="actions"><button class="btn outline" data-open="${r.id}">Ver</button>${isQuality(u)&&r.status==="SOLICITADA"&&r.ready?`<button class="btn primary" data-take="${r.id}">Tomar</button>`:""}${isQuality(u)&&r.quality===u.id&&["TOMADA","EN_EVALUACION"].includes(r.status)?`<button class="btn success" data-eval="${r.id}">Evaluar</button>`:""}</div></td></tr>`).join("")}</tbody></table></div>`}
function detail(u){let r=req(ui.selected);if(!r)return`<div class="alert a-danger">No existe la inspección.</div>`;if(u.role==="EJECUCION"&&r.createdBy!==u.id)return denied();if(!canReadAll(u)&&u.role!=="EJECUCION")return denied();return`<div class="pagehead"><div><h2>${r.code}</h2><p>${esc(r.activity)} · ${esc(r.location)}</p></div><div class="buttons">${isQuality(u)&&r.status==="SOLICITADA"&&r.ready?`<button class="btn primary" data-take="${r.id}">Tomar</button>`:""}${isQuality(u)&&r.quality===u.id&&["TOMADA","EN_EVALUACION"].includes(r.status)?`<button class="btn success" data-eval="${r.id}">Abrir planilla</button>`:""}</div></div><div class="grid g2"><div class="card"><h3>Información general</h3><div class="kv"><div>Solicitante</div><div>${esc(user(r.createdBy)?.name)}</div><div>Tipo</div><div>${roles[user(r.createdBy)?.role]}</div><div>Contratista</div><div>${esc(r.contractor)}</div><div>Paquete</div><div>${esc(r.package)}</div><div>Fecha y hora</div><div>${r.date} · ${r.time}</div><div>Área lista</div><div>${r.ready?"Sí":"No"}</div><div>Responsable Calidad</div><div>${esc(user(r.quality)?.name||"Sin asignar")}</div><div>Estado</div><div>${status(r.status)}</div></div></div><div class="card"><h3>Alcance y evidencias</h3><p>${esc(r.scope)}</p><div class="label">Archivos</div><ul>${r.files.length?r.files.map(f=>`<li>${esc(f)}</li>`).join(""):"<li>Sin archivos</li>"}</ul></div></div>${r.final!==null?`<div class="grid g4" style="margin-top:16px">${metric("Resultado técnico",r.technical.toFixed(1)+"%","Planilla")}${metric("Gestión",r.managementScore.toFixed(1)+"%","Preparación")}${metric("Resultado final",r.final.toFixed(1)+"%","80/20")}${metric("Semáforo",r.traffic,r.decision||"Sin decisión",r.traffic==="Verde"?"pos":r.traffic==="Amarillo"?"warn":"crit")}</div>`:""}<div class="section"><h3>Trazabilidad</h3></div><div class="card"><div class="timeline">${audit(r.audit)}</div></div>`}
function audit(a){return a.map(x=>`<div class="event"><span class="dot"></span><strong>${esc(x.action)}</strong><p>${esc(user(x.user)?.name||"Sistema")} · ${new Date(x.at).toLocaleString("es-DO")}</p></div>`).join("")}
function evaluate(u){if(!isQuality(u))return denied();let r=req(ui.selected);if(!r||r.quality!==u.id&&u.role!=="COORDINADOR")return denied();let s=scores(r);return`<div class="pagehead"><div><h2>Planilla digital</h2><p>${r.code} · ${esc(r.activity)}</p></div></div><div class="alert a-warning">Planilla demostrativa. Sustituir por criterios oficiales de CODELPA.</div><div class="grid g2" style="grid-template-columns:minmax(0,2fr) minmax(285px,1fr)"><div><div class="criteria">${template.map(c=>criterion(r,c)).join("")}</div><div class="card" style="margin-top:16px"><h3>Evaluación de gestión</h3><div class="formgrid">${mfield("Área realmente lista","area",r.management.area)}${mfield("Documentación completa","docs",r.management.docs)}${mfield("Programación adecuada","schedule",r.management.schedule)}${mfield("Soportes previos","support",r.management.support)}</div><div class="formactions"><button class="btn secondary" data-open="${r.id}">Volver</button><button id="finish" class="btn primary">Calcular y finalizar</button></div></div></div><aside class="card scorebox"><div class="label">Resultado técnico preliminar</div><div class="scorenum">${s.technical.toFixed(1)}%</div><div class="progress"><span style="width:${s.technical}%"></span></div><div class="traffic" style="margin-top:17px">${trafficHTML(s.final,r.objective)}</div><hr style="border:0;border-top:1px solid var(--line);margin:18px 0"><div class="label">Objetivo</div><div style="font-size:26px;font-weight:900">${r.objective}%</div><div class="foot">Técnico 80% · Gestión 20%</div>${s.blocked?'<div class="alert a-danger" style="margin-top:15px">Criterio bloqueante fallido.</div>':""}</aside></div>`}
function criterion(r,c){let a=r.answers[c.id]||"";return`<article class="criterion"><span class="badge b-blue">${c.section}</span><h4>${c.id} · ${c.q}</h4><div class="meta">Peso: ${c.w}% ${c.block?"· Bloqueante":""}</div><div class="opts">${c.opts.map(o=>`<button class="opt ${a===o?(c.block&&o==="Sí"?"blocked":"selected"):""}" data-answer="${c.id}" data-value="${o}">${o}</button>`).join("")}</div><div class="field"><label>Observación</label><textarea data-note="${c.id}">${esc(r.notes[c.id]||"")}</textarea></div></article>`}
function mfield(l,k,v){return`<div class="field"><label>${l}</label><input type="number" min="0" max="100" value="${v}" data-management="${k}"></div>`}
function ans(id,v){if(!v)return null;if(id==="DEM-004")return v==="No"?100:0;if(v==="Cumple")return 100;if(v==="Parcial")return 50;if(v==="No cumple")return 0;if(v==="No aplica")return null;return 0}
function scores(r){let n=0,d=0;template.forEach(c=>{let s=ans(c.id,r.answers[c.id]);if(s!==null){n+=s*c.w;d+=c.w}});let technical=d?n/d:0,m=(+r.management.area + +r.management.docs + +r.management.schedule + +r.management.support)/4,final=technical*.8+m*.2;return{technical,management:m,final,blocked:r.answers["DEM-004"]==="Sí"}}
function traffic(s,o){let d=s-o;return d>=0?"Verde":d>=-5?"Amarillo":"Rojo"}function trafficHTML(s,o){let t=traffic(s,o),c=t==="Verde"?"green":t==="Amarillo"?"yellow":"red";return`<span class="light ${c}"></span>${t} · ${s.toFixed(1)}%`}
function dashboard(u){let scored=data.requests.filter(x=>x.final!==null),av=scored.length?scored.reduce((a,x)=>a+x.final,0)/scored.length:92.4;return`<div class="pagehead"><div><h2>${u.role==="PRESIDENTE"?"Resumen ejecutivo global":u.role==="GERENCIA"?"Dashboard del proyecto":"Dashboard de Calidad"}</h2><p>Datos operativos del demo.</p></div></div><div class="grid g4">${metric("Solicitudes",data.requests.length,"Registradas")}${metric("Calificadas",scored.length,"Con resultado")}${metric("Resultado promedio",av.toFixed(1)+"%","Periodo actual","pos")}${metric("Liberadas",data.requests.filter(x=>x.status==="LIBERADA").length,"Decisión de Calidad")}</div><div class="grid g2" style="margin-top:16px"><div class="card"><h3>Resultado por actividad</h3>${bar("Mampostería",91)}${bar("Pañete",96)}${bar("Pisos",94)}${bar("Pintura",88)}${bar("Drywall",93)}</div><div class="card"><h3>Indicadores operativos</h3><div class="kv"><div>Disponibles</div><div>${data.requests.filter(x=>x.status==="SOLICITADA"&&x.ready).length}</div><div>No confirmadas</div><div>${data.requests.filter(x=>!x.ready).length}</div><div>En evaluación</div><div>${data.requests.filter(x=>x.status==="EN_EVALUACION").length}</div><div>Con observaciones</div><div>${data.requests.filter(x=>x.status==="CON_OBSERVACIONES").length}</div></div></div></div><div class="section"><h3>Inspecciones recientes</h3></div>${table(sortQ(data.requests),u)}`}
function bar(n,v){return`<div class="barrow"><strong>${n}</strong><div class="track"><div class="fill" style="width:${v}%"></div></div><strong>${v}%</strong></div>`}
function avg(){let r=data.requests.filter(x=>x.final!==null);return r.length?(r.reduce((a,x)=>a+x.final,0)/r.length).toFixed(1):"92.4"}
function usersView(u){if(u.role!=="COORDINADOR")return denied();return`<div class="pagehead"><div><h2>Usuarios y permisos</h2><p>Cada usuario queda identificado por su rol operativo.</p></div></div><div class="tablewrap"><table><thead><tr><th>Nombre</th><th>Correo</th><th>Tipo</th><th>Permisos</th></tr></thead><tbody>${data.users.map(x=>`<tr><td>${x.name}</td><td>${x.email}</td><td><span class="badge ${x.role==="EJECUCION"?"b-blue":x.role==="CALIDAD"||x.role==="COORDINADOR"?"b-green":"b-gray"}">${roles[x.role]}</span></td><td>${perm(x.role)}</td></tr>`).join("")}</tbody></table></div>`}
function perm(r){return{EJECUCION:"Solicitar y consultar resultados propios",CALIDAD:"Tomar, evaluar y decidir inspecciones",COORDINADOR:"Calidad, monitoreo y usuarios",GERENCIA:"Consulta del proyecto",PRESIDENTE:"Consulta ejecutiva"}[r]}
function denied(){return`<div class="alert a-danger">No tiene permisos para acceder a esta vista.</div>`}
function bind(u){document.querySelectorAll("[data-fill]").forEach(b=>b.onclick=()=>{email.value=b.dataset.fill;password.value="1234"});if(document.getElementById("loginBtn")){loginBtn.onclick=doLogin;email.onkeydown=password.onkeydown=e=>{if(e.key==="Enter")doLogin()}}document.querySelectorAll("[data-nav]").forEach(b=>b.onclick=()=>go(b.dataset.nav));document.getElementById("logout")?.addEventListener("click",()=>{localStorage.removeItem(SESSION_KEY);ui={view:"home",selected:null,tab:"DISPONIBLES"};render()});document.getElementById("reset")?.addEventListener("click",()=>{if(confirm("¿Restablecer demo?")){data=fresh();save();showToast("Demo restablecido");go("home")}});document.getElementById("menu")?.addEventListener("click",()=>{sidebar.classList.add("open");overlay.classList.remove("hidden")});document.getElementById("overlay")?.addEventListener("click",closeMenu);document.getElementById("draft")?.addEventListener("click",()=>create(u,false));document.getElementById("submit")?.addEventListener("click",()=>create(u,true));document.querySelectorAll("[data-open]").forEach(b=>b.onclick=()=>{ui.selected=b.dataset.open;ui.view="detail";render()});document.querySelectorAll("[data-take]").forEach(b=>b.onclick=()=>take(u,b.dataset.take));document.querySelectorAll("[data-eval]").forEach(b=>b.onclick=()=>startEval(u,b.dataset.eval));document.querySelectorAll("[data-tab]").forEach(b=>b.onclick=()=>{ui.tab=b.dataset.tab;render()});document.querySelectorAll("[data-answer]").forEach(b=>b.onclick=()=>{let r=req(ui.selected);r.answers[b.dataset.answer]=b.dataset.value;save();render()});document.querySelectorAll("[data-note]").forEach(t=>t.onchange=()=>{let r=req(ui.selected);r.notes[t.dataset.note]=t.value;save()});document.querySelectorAll("[data-management]").forEach(i=>i.onchange=()=>{let r=req(ui.selected);r.management[i.dataset.management]=Math.max(0,Math.min(100,+i.value||0));save();render()});document.getElementById("finish")?.addEventListener("click",()=>finish(u))}
function doLogin(){let u=data.users.find(x=>x.email.toLowerCase()===email.value.trim().toLowerCase()&&x.password===password.value);if(!u){loginError.innerHTML='<div class="alert a-danger">Correo o contraseña incorrectos.</div>';return}localStorage.setItem(SESSION_KEY,JSON.stringify({user:u.id}));render()}
function go(v){ui.view=v;if(!["detail","evaluate"].includes(v))ui.selected=null;render();closeMenu();scrollTo(0,0)}function closeMenu(){document.getElementById("sidebar")?.classList.remove("open");document.getElementById("overlay")?.classList.add("hidden")}
function create(u,submitIt){let files=[...photos.files,...docs.files].map(f=>f.name),r={id:"r"+Date.now(),code:`INSP-LCE-2026-${String(data.requests.length+1).padStart(4,"0")}`,createdBy:u.id,activity:activity.value,objective:+objective.value||90,contractor:contractor.value,location:location.value,package:package.value,scope:scope.value,date:date.value,time:time.value,ready:ready.checked,files,status:submitIt?"SOLICITADA":"BORRADOR",quality:null,answers:{},notes:{},management:{area:ready.checked?100:0,docs:docs.files.length?100:60,schedule:100,support:photos.files.length?100:60},technical:null,managementScore:null,final:null,traffic:null,decision:null,audit:[{at:now(),user:u.id,action:submitIt?"Solicitud enviada a Calidad":"Borrador creado"}]};data.requests.unshift(r);save();showToast(submitIt?"Solicitud enviada a Calidad":"Borrador guardado");ui.view="mine";render()}
function take(u,id){let r=req(id);if(!r||r.status!=="SOLICITADA")return;r.quality=u.id;r.status="TOMADA";r.audit.push({at:now(),user:u.id,action:"Inspección tomada por Calidad"});save();showToast("Inspección asignada");ui.selected=id;ui.view="detail";render()}
function startEval(u,id){let r=req(id);if(r.status==="TOMADA"){r.status="EN_EVALUACION";r.audit.push({at:now(),user:u.id,action:"Evaluación iniciada"});save()}ui.selected=id;ui.view="evaluate";render()}
function finish(u){let r=req(ui.selected),missing=template.filter(c=>!r.answers[c.id]);if(missing.length){showToast("Complete todos los criterios");return}let s=scores(r);r.technical=s.technical;r.managementScore=s.management;r.final=s.final;r.traffic=traffic(s.final,r.objective);r.status=s.blocked?"NO_LIBERADA":s.final>=r.objective?"LIBERADA":s.final>=r.objective-5?"CON_OBSERVACIONES":"NO_LIBERADA";r.decision=r.status==="LIBERADA"?"Liberada":r.status==="CON_OBSERVACIONES"?"Con observaciones":"No liberada";r.audit.push({at:now(),user:u.id,action:`Evaluación finalizada: ${r.decision}`});save();showToast("Evaluación finalizada");ui.view="detail";render()}
render();
</script></body></html>
